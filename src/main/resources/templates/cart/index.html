<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div})}">
<body>
    <div class="container py-5">
        <h2 class="mb-4">Giỏ hàng của bạn</h2>
        
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        
        <div th:if="${#lists.isEmpty(cart.items)}" class="text-center py-5">
            <i class="bi bi-cart-x fs-1 text-muted d-block mb-3"></i>
            <h5 class="text-muted">Giỏ hàng trống</h5>
            <a href="/products" class="btn btn-primary mt-3">Tiếp tục mua sắm</a>
        </div>
        
        <div th:unless="${#lists.isEmpty(cart.items)}" class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col" class="ps-4">Sản phẩm</th>
                                    <th scope="col">Đơn giá</th>
                                    <th scope="col" style="width: 120px;">Số lượng</th>
                                    <th scope="col">Thành tiền</th>
                                    <th scope="col"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${cart.items}">
                                    <td class="ps-4 py-3">
                                        <div class="d-flex align-items-center">
                                            <img th:if="${#lists.isEmpty(item.product.images)}" src="https://dummyimage.com/60x60/e9ecef/6c757d.jpg&text=No+Img" class="rounded me-3" style="width: 60px; height: 60px; object-fit: cover;">
                                            <div th:unless="${#lists.isEmpty(item.product.images)}">
                                                <img th:each="img : ${item.product.images}" th:if="${img.isPrimary}" th:src="@{'/uploads/products/' + ${img.imageUrl}}" class="rounded me-3" style="width: 60px; height: 60px; object-fit: cover;">
                                            </div>
                                            <div>
                                                <a th:href="@{'/products/' + ${item.product.slug}}" class="text-dark fw-bold text-decoration-none" th:text="${item.product.name}">Tên SP</a>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="fw-bold" th:text="${#numbers.formatDecimal(item.product.price - (item.product.price * item.product.discountPercent / 100), 0, 'COMMA', 0, 'POINT')} + 'đ'">10,000,000đ</span>
                                    </td>
                                    <td>
                                        <form th:action="@{/cart/update}" method="post" class="d-flex">
                                            <input type="hidden" name="itemId" th:value="${item.id}">
                                            <input type="number" name="quantity" th:value="${item.quantity}" class="form-control form-control-sm text-center me-1" min="1" th:max="${item.product.stock}">
                                            <button type="submit" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-repeat"></i></button>
                                        </form>
                                    </td>
                                    <td>
                                        <span class="text-danger fw-bold" th:text="${#numbers.formatDecimal((item.product.price - (item.product.price * item.product.discountPercent / 100)) * item.quantity, 0, 'COMMA', 0, 'POINT')} + 'đ'">20,000,000đ</span>
                                    </td>
                                    <td class="text-end pe-4">
                                        <a th:href="@{'/cart/remove/' + ${item.id}}" class="text-danger" title="Xóa" onclick="return confirm('Xóa sản phẩm này khỏi giỏ hàng?');"><i class="bi bi-trash fs-5"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h5 class="fw-bold border-bottom pb-3 mb-3">Tổng đơn hàng</h5>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Tạm tính:</span>
                            <span class="fw-bold" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">20,000,000đ</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4">
                            <span>Phí vận chuyển:</span>
                            <span class="text-success">Miễn phí</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold fs-5">Tổng cộng:</span>
                            <span class="fw-bold fs-4 text-danger" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">20,000,000đ</span>
                        </div>
                        <a href="/checkout" class="btn btn-primary btn-lg w-100">Tiến hành thanh toán</a>
                        <a href="/products" class="btn btn-link text-decoration-none text-center d-block mt-3 text-muted">Tiếp tục mua sắm</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
