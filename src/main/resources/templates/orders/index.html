<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div})}">
<body>
    <div class="container py-5">
        <h2 class="mb-4">Đơn hàng của tôi</h2>
        
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Mã ĐH</th>
                            <th>Ngày đặt</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                            <th class="text-end pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td class="ps-4 fw-bold" th:text="'#' + ${order.id}">#1</td>
                            <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">11/06/2026</td>
                            <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(order.totalAmount - order.discountAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">10,000,000đ</td>
                            <td>
                                <span class="badge" th:classappend="${order.status.name() == 'PENDING' ? 'bg-warning text-dark' : (order.status.name() == 'DELIVERED' ? 'bg-success' : 'bg-primary')}" th:text="${order.status}">PENDING</span>
                            </td>
                            <td class="text-end pe-4">
                                <a th:href="@{'/orders/' + ${order.id}}" class="btn btn-sm btn-outline-primary">Chi tiết</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="5" class="text-center py-5 text-muted">
                                <i class="bi bi-box-seam fs-1 d-block mb-3"></i>
                                Bạn chưa có đơn hàng nào.<br>
                                <a href="/products" class="btn btn-primary mt-3">Khám phá sản phẩm</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
