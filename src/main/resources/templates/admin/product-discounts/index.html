<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div})}">
<head><title>Quản lý Giảm giá Sản phẩm</title></head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Quản lý Giảm giá Sản phẩm</h2>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Hình ảnh</th>
                                <th>Tên sản phẩm</th>
                                <th>Giá gốc (VNĐ)</th>
                                <th>Giảm giá (%)</th>
                                <th>Giá sau giảm</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="product : ${products}">
                                <td th:text="${product.id}">1</td>
                                <td>
                                    <img th:if="${product.primaryImageUrl != null}" 
                                         th:src="${product.primaryImageUrl}" 
                                         alt="Product Image" 
                                         style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;">
                                    <div th:unless="${product.primaryImageUrl != null}" 
                                         class="bg-light d-flex align-items-center justify-content-center" 
                                         style="width: 50px; height: 50px; border-radius: 8px;">
                                        <i class="bi bi-image text-muted"></i>
                                    </div>
                                </td>
                                <td>
                                    <strong th:text="${product.name}">Laptop X</strong><br>
                                    <small class="text-muted" th:text="${product.category.name}">Category</small>
                                </td>
                                <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">20,000,000 đ</td>
                                
                                <form th:action="@{/admin/product-discounts/update}" method="post">
                                    <input type="hidden" name="id" th:value="${product.id}">
                                    <td>
                                        <div class="input-group" style="width: 120px;">
                                            <input type="number" name="discountPercent" class="form-control text-center fw-bold text-danger" th:value="${product.discountPercent}" min="0" max="100" required>
                                            <span class="input-group-text">%</span>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="fw-bold text-success" th:text="${#numbers.formatDecimal(product.price - (product.price * product.discountPercent / 100), 0, 'COMMA', 0, 'POINT')} + ' đ'">18,000,000 đ</span>
                                    </td>
                                    <td>
                                        <button type="submit" class="btn btn-sm btn-primary">Cập nhật</button>
                                    </td>
                                </form>
                            </tr>
                            <tr th:if="${#lists.isEmpty(products)}">
                                <td colspan="7" class="text-center py-4 text-muted">Không có sản phẩm nào.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
