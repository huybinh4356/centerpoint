<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div})}">
<head><title>Quản lý Người dùng</title></head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Quản lý Người dùng</h2>
            <a href="/admin/users/create" class="btn btn-sm btn-success text-nowrap"><i class="bi bi-plus-lg"></i> Thêm mới</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-body p-0 table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Họ Tên</th>
                            <th>Email</th>
                            <th>SĐT</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th class="text-end">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.id}">1</td>
                            <td th:text="${u.fullName}">Nguyen Van A</td>
                            <td th:text="${u.email}">user@example.com</td>
                            <td th:text="${u.phone}">0123456789</td>
                            <td>
                                <span class="badge bg-secondary" th:text="${u.role}">ROLE_USER</span>
                            </td>
                            <td>
                                <span th:if="${!u.locked}" class="badge bg-success">Hoạt động</span>
                                <span th:if="${u.locked}" class="badge bg-danger">Bị khóa</span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{/admin/users/edit/{email}(email=${u.email})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i> Sửa</a>
                                <a th:if="${!u.locked && u.role.name() != 'ROLE_ADMIN'}" th:href="@{/admin/users/lock/{id}(id=${u.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Khóa tài khoản này?');"><i class="bi bi-lock"></i> Khóa</a>
                                <a th:if="${u.locked && u.role.name() != 'ROLE_ADMIN'}" th:href="@{/admin/users/unlock/{id}(id=${u.id})}" class="btn btn-sm btn-outline-success"><i class="bi bi-unlock"></i> Mở khóa</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="7" class="text-center py-4 text-muted">Chưa có người dùng nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
