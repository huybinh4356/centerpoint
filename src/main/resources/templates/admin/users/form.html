<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div})}">
<head><title>Tạo / Cập nhật Người dùng</title></head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0" th:text="${user.id == null ? 'Thêm Người dùng mới' : 'Cập nhật Người dùng'}">Thêm Người dùng mới</h2>
            <a href="/admin/users" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay lại</a>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{${user.id == null ? '/admin/users/create' : '/admin/users/edit'}}" th:object="${user}" method="post">
                    <input type="hidden" th:if="${user.id != null}" th:field="*{id}" />
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" th:field="*{email}" required th:readonly="${user.id != null}">
                        </div>
                        <div class="col-md-6" th:if="${user.id == null}">
                            <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" th:field="*{password}" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Họ và Tên</label>
                            <input type="text" class="form-control" th:field="*{fullName}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" class="form-control" th:field="*{phone}">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Vai trò</label>
                            <select class="form-select" th:field="*{role}">
                                <option value="ROLE_USER">Người dùng (USER)</option>
                                <option value="ROLE_ADMIN">Quản trị viên (ADMIN)</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Lưu thông tin</button>
                        <a href="/admin/users" class="btn btn-light ms-2">Hủy bỏ</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
