<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div})}">
<head><title>Quản lý Banner</title></head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Quản lý Banner</h2>
            <a th:href="@{/admin/banners/create}" class="btn btn-primary btn-sm text-nowrap"><i class="bi bi-plus-lg"></i> Thêm mới</a>
        </div>
        
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-body p-0 table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Ảnh</th>
                            <th>Tên Banner</th>
                            <th>Loại</th>
                            <th>Link Đích</th>
                            <th>Thứ tự</th>
                            <th>Trạng thái</th>
                            <th class="text-end">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="banner : ${banners}">
                            <td>
                                <img th:src="@{'/uploads/products/' + ${banner.imageUrl}}" alt="Banner" style="height: 60px; object-fit: cover; border-radius: 8px;">
                            </td>
                            <td class="fw-semibold" th:text="${banner.name}">Tên Banner</td>
                            <td>
                                <span class="badge bg-primary" th:if="${banner.type == 'MAIN'}">MAIN</span>
                                <span class="badge bg-secondary" th:if="${banner.type == 'SUB'}">SUB</span>
                            </td>
                            <td th:text="${banner.targetUrl}">http...</td>
                            <td th:text="${banner.displayOrder}">1</td>
                            <td>
                                <span class="badge bg-success" th:if="${banner.isActive}">Hiển thị</span>
                                <span class="badge bg-danger" th:unless="${banner.isActive}">Đã ẩn</span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{/admin/banners/edit/{id}(id=${banner.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i> Sửa</a>
                                <a th:href="@{/admin/banners/delete/{id}(id=${banner.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Bạn có chắc chắn muốn xóa banner này?');"><i class="bi bi-trash"></i> Xóa</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(banners)}">
                            <td colspan="7" class="text-center py-4 text-muted">Chưa có banner nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
