<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div})}">
<head><title>Form Banner</title></head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0" th:text="${banner.id != null ? 'Sửa Banner' : 'Thêm Banner Mới'}">Thêm Banner</h2>
            <a th:href="@{/admin/banners}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Quay lại</a>
        </div>
        
        <div class="card" style="max-width: 800px;">
            <div class="card-body">
                <form th:action="@{/admin/banners/save}" th:object="${banner}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{imageUrl}" th:if="${banner.id != null}">
                    
                    <div class="mb-3">
                        <label class="form-label">Tên Banner (để quản lý) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Loại Banner <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{type}" required>
                                <option value="MAIN">MAIN (Ảnh lớn bên trái)</option>
                                <option value="SUB">SUB (Ảnh nhỏ bên phải)</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Thứ tự hiển thị (Nhỏ xếp trước)</label>
                            <input type="number" class="form-control" th:field="*{displayOrder}" value="0">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Đường dẫn khi click (Target URL)</label>
                        <input type="text" class="form-control" th:field="*{targetUrl}" placeholder="VD: /products/laptop-gaming">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Tải ảnh lên <span th:if="${banner.id == null}" class="text-danger">*</span></label>
                        <input type="file" class="form-control" name="imageFile" accept="image/*" th:required="${banner.id == null}">
                        <div th:if="${banner.imageUrl != null}" class="mt-2">
                            <img th:src="@{'/uploads/products/' + ${banner.imageUrl}}" alt="Current Image" style="max-height: 150px; border-radius: 8px;">
                            <p class="text-muted small mt-1">Ảnh hiện tại (Nếu chọn file mới sẽ ghi đè ảnh cũ)</p>
                        </div>
                    </div>

                    <div class="form-check form-switch mb-4">
                        <input class="form-check-input" type="checkbox" role="switch" th:field="*{active}" id="isActiveSwitch">
                        <label class="form-check-label" for="isActiveSwitch">Hiển thị (Active)</label>
                    </div>
                    
                    <hr>
                    <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> Lưu Banner</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
