<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div})}">
<head><title>Quản lý Sản phẩm</title></head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Quản lý Sản phẩm</h2>
            <div class="d-flex gap-2 align-items-center">
                <form th:action="@{/admin/products/import}" method="post" enctype="multipart/form-data" class="d-flex align-items-center gap-2">
                    <input type="file" name="file" accept=".json" class="form-control form-control-sm" required>
                    <button type="submit" class="btn btn-success btn-sm text-nowrap"><i class="bi bi-file-earmark-arrow-up"></i> Import JSON</button>
                </form>
                <a th:href="@{/admin/products/create}" class="btn btn-primary btn-sm text-nowrap"><i class="bi bi-plus-lg"></i> Thêm mới</a>
            </div>
        </div>
        
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div class="card">
            <div class="card-body p-0 table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Tên sản phẩm</th>
                            <th>Thương hiệu</th>
                            <th>Danh mục</th>
                            <th>Giá</th>
                            <th>Tồn kho</th>
                            <th class="text-end">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.id}">1</td>
                            <td th:text="${product.name}">Laptop Dell XPS 15</td>
                            <td th:text="${product.brand.name}">Dell</td>
                            <td th:text="${product.category.name}">Laptop Văn Phòng</td>
                            <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">20,000,000đ</td>
                            <td th:text="${product.stock}">10</td>
                            <td class="text-end">
                                <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i> Sửa</a>
                                <a th:href="@{/admin/products/delete/{id}(id=${product.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Bạn có chắc chắn muốn xóa?');"><i class="bi bi-trash"></i> Xóa</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="7" class="text-center py-4 text-muted">Chưa có sản phẩm nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
