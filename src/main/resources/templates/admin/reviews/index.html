<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div})}">
<head><title>Quản lý Đánh giá</title></head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Quản lý Đánh giá</h2>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Khách hàng</th>
                                <th>Sản phẩm</th>
                                <th>Số sao</th>
                                <th style="width: 30%;">Nội dung</th>
                                <th>Trạng thái</th>
                                <th>Ngày đánh giá</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="review : ${reviews}">
                                <td>
                                    <strong th:text="${review.user?.fullName}">Tên KH</strong><br>
                                    <small class="text-muted" th:text="${review.user?.email}">Email</small>
                                </td>
                                <td>
                                    <a th:if="${review.product != null}" th:href="@{'/products/' + ${review.product.slug}}" target="_blank" th:text="${review.product.name}">Tên SP</a>
                                </td>
                                <td class="text-warning">
                                    <i th:each="i : ${#numbers.sequence(1, 5)}" class="bi" th:classappend="${i <= review.rating ? 'bi-star-fill' : 'bi-star'}"></i>
                                </td>
                                <td>
                                    <div style="max-height: 100px; overflow-y: auto;" th:text="${review.comment}">Nội dung...</div>
                                    <div th:if="${review.adminReply != null}" class="mt-2 p-2 bg-light border-start border-3 border-primary small">
                                        <strong>Đã trả lời:</strong> <span th:text="${review.adminReply}"></span>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge" th:classappend="${review.adminReply != null ? 'bg-success' : 'bg-warning text-dark'}" th:text="${review.adminReply != null ? 'Đã phản hồi' : 'Chưa phản hồi'}">Trạng thái</span>
                                </td>
                                <td th:text="${review.createdAt != null ? #temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm') : 'N/A'}">Ngày</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="'#replyModal' + ${review.id}">
                                        <i class="bi bi-reply"></i> Trả lời
                                    </button>
                                    
                                    <!-- Reply Modal -->
                                    <div class="modal fade" th:id="'replyModal' + ${review.id}" tabindex="-1" aria-hidden="true" style="text-align: left;">
                                        <div class="modal-dialog">
                                            <form th:action="@{/admin/reviews/reply}" method="post">
                                                <input type="hidden" name="reviewId" th:value="${review.id}">
                                                <div class="modal-content">
                                                    <div class="modal-header">
                                                        <h5 class="modal-title">Trả lời đánh giá</h5>
                                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                                    </div>
                                                    <div class="modal-body">
                                                        <div class="mb-3 p-3 bg-light rounded text-wrap">
                                                            <strong th:text="${review.user?.fullName}">Tên KH</strong> đã viết:<br>
                                                            <em class="text-muted" th:text="'&quot;' + ${review.comment} + '&quot;'">Nội dung</em>
                                                        </div>
                                                        <div class="mb-3">
                                                            <label class="form-label fw-bold">Câu trả lời từ cửa hàng:</label>
                                                            <textarea name="reply" class="form-control" rows="4" required th:text="${review.adminReply}"></textarea>
                                                        </div>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                                        <button type="submit" class="btn btn-primary">Gửi phản hồi</button>
                                                    </div>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(reviews)}">
                                <td colspan="7" class="text-center py-4 text-muted">Chưa có đánh giá nào.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
