<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - CenterPoint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --admin-bg: #f4f7fe;
            --sidebar-bg: #ffffff;
            --sidebar-text: #8f9bba;
            --sidebar-hover: #f4f7fe;
            --sidebar-active: #4318ff;
            --accent: #4318ff;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.03);
            --card-bg: #ffffff;
            --text-main: #2b3674;
            --border-color: rgba(0,0,0,0.05);
        }
        [data-bs-theme="dark"] {
            --admin-bg: #12141c;
            --sidebar-bg: #1e2235;
            --sidebar-text: #a0aec0;
            --sidebar-hover: #2d3748;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.2);
            --card-bg: #1e2235;
            --text-main: #e2e8f0;
            --border-color: rgba(255,255,255,0.05);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--admin-bg); 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .sidebar { 
            height: 100vh; 
            background-color: var(--sidebar-bg); 
            color: var(--sidebar-text); 
            position: fixed; 
            overflow-y: auto; 
            box-shadow: 4px 0 24px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .sidebar .brand { 
            font-size: 1.8rem; 
            font-weight: 800; 
            color: var(--text-main); 
            text-align: center; 
            padding: 30px 20px; 
            display: block; 
            text-decoration: none; 
            letter-spacing: -0.5px;
        }
        .sidebar a.nav-item-link { 
            color: var(--sidebar-text); 
            text-decoration: none; 
            padding: 14px 25px; 
            display: flex; 
            align-items: center; 
            font-weight: 500;
            transition: all 0.2s ease;
            margin: 4px 16px;
            border-radius: 12px;
        }
        .sidebar a.nav-item-link:hover { 
            background-color: var(--sidebar-hover); 
            color: var(--text-main); 
        }
        .sidebar a.nav-item-link.active { 
            background-color: var(--sidebar-active); 
            color: white; 
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(67, 24, 255, 0.4);
        }
        
        .sidebar a.nav-item-link i {
            font-size: 1.2rem;
            margin-right: 12px !important;
        }

        .main-content { 
            margin-left: 250px; 
            padding: 30px 40px; 
            min-height: 100vh;
        }
        
        /* Modern Cards */
        .card { 
            border: none; 
            border-radius: 16px; 
            box-shadow: var(--card-shadow); 
            background: var(--card-bg);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        .card-header {
            background-color: transparent;
            border-bottom: 1px solid var(--border-color);
            padding: 20px 25px;
            font-weight: 700;
        }
        
        /* Premium Header */
        .admin-header {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px 25px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
        }
        
        .table {
            vertical-align: middle;
        }
        .table thead th {
            color: #8f9bba;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            border-bottom: none;
            padding: 15px;
        }
        .table tbody td {
            padding: 15px;
            color: var(--text-main);
            font-weight: 500;
            border-bottom-color: var(--border-color);
        }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar" style="width: 250px;">
            <a href="/admin/dashboard" class="brand">CenterPoint</a>
            <a href="/admin/dashboard" class="nav-item-link" data-path="/admin/dashboard"><i class="bi bi-speedometer2 me-2"></i> Tổng quan</a>
            <a href="/admin/categories" class="nav-item-link" data-path="/admin/categories"><i class="bi bi-tags me-2"></i> Danh mục</a>
            <a href="/admin/brands" class="nav-item-link" data-path="/admin/brands"><i class="bi bi-building me-2"></i> Thương hiệu</a>
            <a href="/admin/products" class="nav-item-link" data-path="/admin/products"><i class="bi bi-laptop me-2"></i> Sản phẩm</a>
            <a href="/admin/product-discounts" class="nav-item-link" data-path="/admin/product-discounts"><i class="bi bi-percent me-2"></i> Giảm giá SP</a>
            <a href="/admin/promotions" class="nav-item-link" data-path="/admin/promotions"><i class="bi bi-ticket-perforated me-2"></i> Mã Voucher</a>
            <a href="/admin/reviews" class="nav-item-link" data-path="/admin/reviews"><i class="bi bi-star-fill me-2"></i> Đánh giá KH</a>
            <a href="/admin/banners" class="nav-item-link" data-path="/admin/banners"><i class="bi bi-images me-2"></i> Banner</a>
            <a href="/admin/users" class="nav-item-link" data-path="/admin/users"><i class="bi bi-people me-2"></i> Người dùng</a>
            <a href="/admin/orders" class="nav-item-link" data-path="/admin/orders"><i class="bi bi-receipt me-2"></i> Đơn hàng</a>
            <a href="/admin/payments" class="nav-item-link" data-path="/admin/payments"><i class="bi bi-credit-card me-2"></i> Xác thực thanh toán</a>
            <a href="/admin/settings/payment" class="nav-item-link" data-path="/admin/settings/payment"><i class="bi bi-qr-code me-2"></i> Cài đặt thanh toán</a>
            <hr class="text-secondary mx-3 opacity-25">
            <a href="/" class="nav-item-link text-info"><i class="bi bi-shop"></i> Về cửa hàng</a>
            <a href="/logout" class="nav-item-link text-danger"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a>
        </div>

        <!-- Main Content -->
        <div class="main-content w-100">
            <div class="admin-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0 fw-bold" style="color: var(--text-main);">Quản trị hệ thống</h4>
                
                <div class="d-flex align-items-center gap-2 mb-0">
                    <a href="#" class="btn btn-sm btn-outline-secondary" id="adminThemeToggle">
                        <i class="bi bi-moon-fill" id="adminThemeIcon"></i>
                    </a>
                </div>
            </div>
            <div class="main-content" th:replace="${content}">
                <!-- Dynamic Content Here -->
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Theme setup
            const themeToggle = document.getElementById('adminThemeToggle');
            const themeIcon = document.getElementById('adminThemeIcon');
            const htmlElement = document.documentElement;

            const currentTheme = localStorage.getItem('theme') || 'light';
            if (currentTheme === 'dark') {
                htmlElement.setAttribute('data-bs-theme', 'dark');
                themeIcon.classList.replace('bi-moon-fill', 'bi-sun-fill');
            }

            themeToggle.addEventListener('click', (e) => {
                e.preventDefault();
                if (htmlElement.getAttribute('data-bs-theme') === 'dark') {
                    htmlElement.removeAttribute('data-bs-theme');
                    localStorage.setItem('theme', 'light');
                    themeIcon.classList.replace('bi-sun-fill', 'bi-moon-fill');
                } else {
                    htmlElement.setAttribute('data-bs-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                    themeIcon.classList.replace('bi-moon-fill', 'bi-sun-fill');
                }
            });

            var path = window.location.pathname;
            document.getElementById("redirectUrlInput").value = path;
            
            var links = document.querySelectorAll('.nav-item-link');
            links.forEach(function(link) {
                var dataPath = link.getAttribute('data-path');
                if (path === dataPath || path.startsWith(dataPath + '/')) {
                    link.classList.add('active');
                }
            });

            // Auto generate slug
            var nameInput = document.getElementById('name');
            var slugInput = document.getElementById('slug');
            if (nameInput && slugInput) {
                nameInput.addEventListener('keyup', function() {
                    var title = nameInput.value;
                    var slug = title.toLowerCase()
                        .replace(/[áàảạãăắằẳẵặâấầẩẫậ]/g, 'a')
                        .replace(/[éèẻẽẹêếềểễệ]/g, 'e')
                        .replace(/[iíìỉĩị]/g, 'i')
                        .replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o')
                        .replace(/[úùủũụưứừửữự]/g, 'u')
                        .replace(/[ýỳỷỹỵ]/g, 'y')
                        .replace(/đ/g, 'd')
                        .replace(/([^0-9a-z-\s])/g, '')
                        .replace(/(\s+)/g, '-')
                        .replace(/-+/g, '-')
                        .replace(/^-+|-+$/g, '');
                    slugInput.value = slug;
                });
            }
        });
    </script>
</body>
</html>
