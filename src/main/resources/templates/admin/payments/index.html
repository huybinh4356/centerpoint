<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div})}">
<body>
    <div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0 fw-bold">Xác thực Thanh toán Online</h2>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Mã Đơn</th>
                                <th>Khách Hàng</th>
                                <th>Ngày Đặt</th>
                                <th>Phương Thức</th>
                                <th>Tổng Tiền</th>
                                <th>Trạng Thái</th>
                                <th class="text-end pe-4">Hành Động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td class="ps-4 fw-bold text-primary" th:text="'#' + ${order.id}"></td>
                                <td>
                                    <div class="fw-bold text-dark" th:text="${order.address.recipientName}"></div>
                                    <div class="small text-muted" th:text="${order.address.phone}"></div>
                                </td>
                                <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <span class="badge" th:classappend="${order.paymentMethod == 'VISA' ? 'bg-primary' : (order.paymentMethod == 'MOMO' ? 'bg-danger' : 'bg-info')}" th:text="${order.paymentMethod}"></span>
                                </td>
                                <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(order.totalAmount - order.discountAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                                <td>
                                    <span class="badge" th:classappend="${order.paymentStatus == 'PAID' ? 'bg-success' : 'bg-warning text-dark'}">
                                        <i class="bi" th:classappend="${order.paymentStatus == 'PAID' ? 'bi-check-circle' : 'bi-hourglass-split'}"></i>
                                        <span th:text="${order.paymentStatus == 'PAID' ? 'Đã thanh toán' : 'Chờ xác thực'}"></span>
                                    </span>
                                </td>
                                <td class="text-end pe-4">
                                    <form th:if="${order.paymentStatus != 'PAID'}" th:action="@{'/admin/payments/confirm/' + ${order.id}}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-success" onclick="return confirm('Bạn có chắc chắn muốn xác nhận đã nhận được tiền cho đơn hàng này?');">
                                            <i class="bi bi-check2-all me-1"></i> Xác nhận
                                        </button>
                                    </form>
                                    <a th:href="@{'/admin/orders/view/' + ${order.id}}" class="btn btn-sm btn-light border" title="Xem chi tiết đơn">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(orders)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                                    Không có giao dịch thanh toán online nào.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
