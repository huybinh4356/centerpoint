<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CenterPoint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .auth-card { max-width: 400px; margin: 100px auto; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .auth-header { background-color: #212529; color: white; border-radius: 10px 10px 0 0; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card auth-card">
            <div class="auth-header">
                <h3 class="mb-0">Đăng Nhập</h3>
                <p class="text-muted mb-0"><small>Chào mừng trở lại CenterPoint</small></p>
            </div>
            <div class="card-body p-4">
                <div th:if="${param.error}" class="alert alert-danger">
                    Email hoặc mật khẩu không đúng!
                </div>
                <div th:if="${param.logout}" class="alert alert-success">
                    Bạn đã đăng xuất thành công.
                </div>
                <div th:if="${param.registered}" class="alert alert-success">
                    Đăng ký thành công! Vui lòng đăng nhập.
                </div>
                <div th:if="${param.reset}" class="alert alert-success">
                    Đổi mật khẩu thành công! Vui lòng đăng nhập.
                </div>
                
                <form th:action="@{/login-process}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Email</label>
                        <input type="email" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Mật khẩu</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <a th:href="@{/forgot-password}" class="text-decoration-none">Quên mật khẩu?</a>
                        <a th:href="@{/register}" class="text-decoration-none">Đăng ký ngay</a>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Đăng Nhập</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
