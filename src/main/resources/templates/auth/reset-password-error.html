<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi đặt lại mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 text-center">
        <div class="alert alert-danger d-inline-block p-4">
            <h4 class="alert-heading">Đã xảy ra lỗi!</h4>
            <p th:text="${error}">Token không hợp lệ.</p>
            <hr>
            <a th:href="@{/login}" class="btn btn-danger">Quay lại đăng nhập</a>
        </div>
    </div>
</body>
</html>
