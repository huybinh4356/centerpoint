<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - CenterPoint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .auth-card { max-width: 400px; margin: 100px auto; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .auth-header { background-color: #212529; color: white; border-radius: 10px 10px 0 0; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card auth-card">
            <div class="auth-header">
                <h3 class="mb-0">Quên Mật Khẩu</h3>
            </div>
            <div class="card-body p-4">
                <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>
                
                <form th:action="@{/forgot-password}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">Nhập email của bạn</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="text-center mb-3">
                        <a th:href="@{/login}" class="text-decoration-none">Quay lại đăng nhập</a>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Gửi Link Khôi Phục</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
