<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - CenterPoint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f8fafc;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --text-color: #334155;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
        }
        .split-left {
            flex: 1;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .split-left::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, rgba(15,23,42,0) 50%);
            animation: rotate 20s linear infinite reverse;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        .split-left h1 {
            font-size: 3rem;
            font-weight: 900;
            z-index: 1;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .split-left p {
            font-size: 1.2rem;
            color: #94a3b8;
            z-index: 1;
            text-align: center;
            max-width: 400px;
        }
        .split-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            position: relative;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
        }
        .form-control {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }
        .btn-primary {
            background-color: #0f172a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(2, 132, 199, 0.2);
        }
        .btn-home {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-home:hover {
            color: var(--accent-hover);
        }
        @media (max-width: 768px) {
            .split-left { display: none; }
        }
    </style>
</head>
<body>
    <div class="split-left">
        <h1>Center<span style="color: var(--accent-color);">Point</span></h1>
        <p class="mt-3">Tạo tài khoản để nhận được vô vàn ưu đãi đặc quyền và mua sắm dễ dàng hơn bao giờ hết.</p>
    </div>
    <div class="split-right">
        <a href="/" class="btn-home"><i class="bi bi-house-door"></i> Về trang chủ</a>
        <div class="auth-container">
            <h2 class="fw-bold mb-1">Đăng Ký</h2>
            <p class="text-muted mb-4">Trở thành thành viên của CenterPoint</p>

            <div th:if="${error}" class="alert alert-danger shadow-sm border-0 rounded-3">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}">Lỗi</span>
            </div>
            
            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label for="fullName" class="form-label fw-medium">Họ và Tên</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="fullName" th:field="*{fullName}" placeholder="Nguyễn Văn A" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-medium">Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" id="email" th:field="*{email}" placeholder="example@gmail.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label fw-medium">Số điện thoại</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-telephone"></i></span>
                        <input type="tel" class="form-control border-start-0 ps-0" id="phone" th:field="*{phone}" placeholder="0901234567">
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-medium">Mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" id="password" th:field="*{password}" placeholder="Tạo mật khẩu" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3">Tạo Tài Khoản</button>
                <div class="text-center text-muted small">
                    Đã có tài khoản? <a th:href="@{/login}" class="text-decoration-none fw-bold" style="color: var(--accent-hover);">Đăng nhập ngay</a>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
